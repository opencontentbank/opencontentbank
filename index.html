<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Content Bank</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }
        .hero { background-color: #0056b3; color: white; text-align: center; padding: 60px 20px; }
        .hero h1 { font-size: 2.5em; margin-bottom: 10px; }
        .hero p { font-size: 1.2em; font-weight: 300; margin-bottom: 30px; }
        .search-box { max-width: 600px; margin: 0 auto; display: flex; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
        .search-box input { flex: 1; padding: 15px 20px; font-size: 1.1em; border: none; outline: none; }
        .search-box button { padding: 15px 30px; font-size: 1.1em; background-color: #ff9800; color: white; border: none; cursor: pointer; font-weight: bold; }
        
        .category-section { max-width: 1000px; margin: 50px auto; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; padding: 0 20px; }
        .category-card { background: white; width: 280px; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .category-card h3 { color: #0056b3; font-size: 1.4em; margin-top: 0; }
        .category-card p { color: #666; font-size: 0.95em; line-height: 1.5; min-height: 45px; }
        
        /* 다운로드 버튼 디자인 */
        .btn-download { display: inline-block; background: #007bff; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-top: 15px; font-weight: bold; transition: 0.3s; }
        .btn-download:hover { background: #0056b3; }
        
        .footer { text-align: center; padding: 30px; color: #888; font-size: 0.9em; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>📂 Open Content Bank</h1>
        <p>누구나 쉽게, 무료로 찾아 이용할 수 있는 열린 자료실입니다.</p>
        <div class="search-box">
            <input type="text" placeholder="어떤 자료를 찾으시나요? (예: 기획서 양식)">
            <button>검색</button>
        </div>
    </div>

    <div class="category-section">
        <div class="category-card">
            <h3>📄 문서 양식</h3>
            <p>깔끔한 한 페이지짜리 초간단 프로젝트 기획서 텍스트 양식입니다.</p>
            <a href="template.txt" class="btn-download" download>기획서 다운로드</a>
        </div>
        
        <div class="category-card">
            <h3>🖼️ 디자인 소스</h3>
            <p>스마트폰 OLED 액정에 찰떡인 고화질 네온 우주 배경화면입니다.</p>
            <a href="wallpaper1.png" class="btn-download" download>배경화면 다운로드</a>
        </div>
        
        <div class="category-card">
            <h3>💡 참고 자료</h3>
            <p>작업에 영감을 주거나 참고하기 좋은 자료를 준비 중입니다.</p>
            <a href="#" class="btn-download" style="background:#ccc;">업데이트 예정</a>
        </div>
    </div>

    <div class="footer">
        © 2026 Open Content Bank. All rights reserved.
    </div>

</body>
</html>
