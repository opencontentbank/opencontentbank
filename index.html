<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="구글코드를여기에">
    <meta name="naver-site-verification" content="네이버코드를여기에">
    
    <title>Open Content Bank - 무료 자료 저장소</title>
    <meta name="description" content="고퀄리티 배경화면, 실무 문서 양식, 꿀팁을 무료로 공유하는 오픈 콘텐츠 뱅크입니다.">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; color: #333; overflow-x: hidden; }
        
        /* 헤더 & 로고 */
        .header { background: white; padding: 15px 0; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .logo-img { height: 50px; cursor: pointer; }

        .hero { background: linear-gradient(135deg, #0056b3 0%, #00aaff 100%); color: white; text-align: center; padding: 60px 20px; }
        .hero h1 { font-size: 2.8em; margin-bottom: 15px; animation: fadeInUp 0.8s ease; }
        
        /* 검색창 */
        .search-box { max-width: 600px; margin: 0 auto; display: flex; background: white; border-radius: 50px; padding: 5px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: 0.3s; }
        .search-box:focus-within { transform: scale(1.03); }
        .search-box input { flex: 1; border: none; padding: 15px 25px; font-size: 1.1em; border-radius: 50px; outline: none; }
        .search-box button { background: #ff9800; color: white; border: none; padding: 15px 35px; border-radius: 50px; font-weight: bold; cursor: pointer; }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.4s; animation: fadeInUp 1s ease; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        
        .file-list { list-style: none; padding: 0; margin: 20px 0 0; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
        .btn-sm { text-decoration: none; background: #eef6ff; color: #007bff; padding: 8px 18px; border-radius: 8px; font-size: 0.85em; font-weight: 700; transition: 0.3s; }
        .btn-sm:hover { background: #007bff; color: white; }

        /* 방문자수 표시기 */
        .visitor-counter { margin-top: 50px; padding: 20px; background: #eee; border-radius: 10px; display: inline-block; font-size: 0.9em; color: #666; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer { text-align: center; padding: 50px; color: #aaa; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="header">
    <a href="/" style="text-decoration: none; color: #007bff; font-weight: 900; font-size: 1.5rem;">
        📂 OPEN CONTENT BANK
    </a>
</div>

    <div class="hero">
        <h1>나만의 자료 저장소</h1>
        <p>무료 고화질 배경화면부터 실무 양식까지 한곳에</p>
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="filterContents()" placeholder="찾으시는 자료를 입력하세요">
            <button onclick="filterContents()">검색</button>
        </div>
    </div>

    <div class="container">
        <div id="contentGrid" class="grid">
            <div class="card">
                <h3>📄 문서 양식</h3>
                <ul class="file-list">
                    <li class="file-item" data-name="기획서 양식 문서">
                        <span class="file-name">프로젝트 기획서 (Txt)</span>
                        <a href="template.txt" class="btn-sm" download>다운로드</a>
                    </li>
                </ul>
            </div>
            
            <div class="card">
                <h3>🖼️ 디자인 소스</h3>
                <ul class="file-list">
                    <li class="file-item" data-name="네온 우주 배경화면">
                        <span class="file-name">네온 우주 배경화면</span>
                        <a href="wallpaper1.png" class="btn-sm" download>다운로드</a>
                    </li>
                    <li class="file-item" data-name="감성 데스크테리어">
                        <span class="file-name">감성 데스크테리어</span>
                        <a href="wallpaper2.png" class="btn-sm" download>다운로드</a>
                    </li>
                </ul>
            </div>
        </div>
        
        <div style="text-align: center;">
<div class="visitor-counter">
    오늘의 방문자 수: 
    <img src="https://counter.secrethell.site/get/@opencontentbank?style=flat-square&color=blue&label=hits" alt="방문자수" />
</div>
        </div>
    </div>

    <div class="footer">
        © 2026 Open Content Bank. Powered by Gemini.
    </div>

    <script>
        function filterContents() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const fileItems = document.getElementsByClassName('file-item');
            const cards = document.getElementsByClassName('card');
            
            for (let i = 0; i < fileItems.length; i++) {
                let txtValue = fileItems[i].getAttribute('data-name');
                fileItems[i].style.display = txtValue.toLowerCase().indexOf(filter) > -1 ? "" : "none";
            }
            
            for (let j = 0; j < cards.length; j++) {
                const visibleFiles = cards[j].querySelectorAll('.file-item:not([style*="display: none"])');
                cards[j].style.display = visibleFiles.length > 0 ? "" : "none";
            }
        }
    </script>
</body>
</html>
