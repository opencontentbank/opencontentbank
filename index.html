<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Content Bank - 무료 자료 저장소</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; color: #333; overflow-x: hidden; }
        
        /* 헤더 */
        .header { background: white; padding: 15px 0; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .logo-link { text-decoration: none; color: #007bff; font-weight: 900; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* 히어로 섹션 */
        .hero { background: linear-gradient(135deg, #0056b3 0%, #00aaff 100%); color: white; text-align: center; padding: 60px 20px; }
        .hero h1 { font-size: 2.8em; margin-bottom: 15px; font-weight: 800; }
        .hero p { opacity: 0.9; font-size: 1.1em; margin-bottom: 30px; }
        
        /* 검색창 */
        .search-box { max-width: 600px; margin: 0 auto; display: flex; background: white; border-radius: 50px; padding: 5px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .search-box input { flex: 1; border: none; padding: 15px 25px; font-size: 1.1em; border-radius: 50px; outline: none; }
        .search-box button { background: #ff9800; color: white; border: none; padding: 15px 35px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .search-box button:hover { background: #e68a00; }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        /* 카드 디자인 */
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.4s; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .card h3 { margin-top: 0; color: #0056b3; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        
        .file-list { list-style: none; padding: 0; margin: 0; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
        .file-item:last-child { border-bottom: none; }
        .file-name { font-weight: 500; }
        .btn-sm { text-decoration: none; background: #eef6ff; color: #007bff; padding: 8px 18px; border-radius: 8px; font-size: 0.85em; font-weight: 700; transition: 0.3s; }
        .btn-sm:hover { background: #007bff; color: white; }

        /* 방문자수 (이미지 없음, 100% 코드로 제작) */
        .status-section { text-align: center; margin-top: 50px; margin-bottom: 50px; }
        .visitor-box { background: white; padding: 15px 40px; border-radius: 100px; display: inline-flex; align-items: center; gap: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); border: 1px solid #eee; }
        .status-label { color: #aaa; font-size: 0.75rem; font-weight: 800; display: block; margin-bottom: 4px; letter-spacing: 1px; }
        .status-value { color: #333; font-weight: 800; font-size: 1.4rem; font-variant-numeric: tabular-nums; }
        .status-online { color: #28a745; display: flex; align-items: center; gap: 6px; }

        .footer { text-align: center; padding: 50px; color: #aaa; font-size: 0.9em; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <header class="header">
        <a href="/" class="logo-link">📂 OPEN CONTENT BANK</a>
    </header>

    <div class="hero">
        <h1>나만의 자료 저장소</h1>
        <p>무료 고화질 배경화면부터 실무 양식까지 한곳에</p>
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="filterContents()" placeholder="찾으시는 자료를 입력하세요">
            <button onclick="filterContents()">검색</button>
        </div>
    </div>

    <div class="container">
        <div id="contentGrid" class="grid">
            <div class="card">
                <h3>📄 문서 양식</h3>
                <ul class="file-list">
                    <li class="file-item" data-name="기획서 양식 문서">
                        <span class="file-name">프로젝트 기획서 (Txt)</span>
                        <a href="template.txt" class="btn-sm" download>다운로드</a>
                    </li>
                </ul>
            </div>
            <div class="card">
                <h3>🖼️ 디자인 소스</h3>
                <ul class="file-list">
                    <li class="file-item" data-name="네온 우주 배경화면">
                        <span class="file-name">네온 우주 배경화면</span>
                        <a href="wallpaper1.png" class="btn-sm" download>다운로드</a>
                    </li>
                    <li class="file-item" data-name="감성 데스크테리어">
                        <span class="file-name">감성 데스크테리어</span>
                        <a href="wallpaper2.png" class="btn-sm" download>다운로드</a>
                    </li>
                </ul>
            </div>
        </div>

<div class="status-section">
            <div class="visitor-box">
                <div style="border-right: 1px solid #eee; padding-right: 30px; text-align: left;">
                    <span class="status-label">TOTAL VISITS</span>
                    <span id="busuanzi_value_site_pv" class="status-value">0</span>
                </div>
                <div style="text-align: left;">
                    <span class="status-label">SERVER STATUS</span>
                    <span class="status-value status-online">● ONLINE</span>
                </div>
            </div>
        </div>

    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    
    <script>
        // 검색 기능 (기존과 동일)
        function filterContents() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const fileItems = document.getElementsByClassName('file-item');
            const cards = document.getElementsByClassName('card');
            for (let i = 0; i < fileItems.length; i++) {
                let txtValue = fileItems[i].getAttribute('data-name');
                fileItems[i].style.display = txtValue.toLowerCase().indexOf(filter) > -1 ? "" : "none";
            }
            for (let j = 0; j < cards.length; j++) {
                const visibleFiles = cards[j].querySelectorAll('.file-item:not([style*="display: none"])');
                cards[j].style.display = visibleFiles.length > 0 ? "" : "none";
            }
        }
    </script>
</body>
</html>
